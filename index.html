<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>App Dieta</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: #00ff88;
      font-weight: bold;
      margin-top: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <h1>App Dieta 🔥</h1>

  <p>Inserisci le calorie:</p>

  <input type="number" id="calorie" placeholder="es. 500">
  <br>
  <button onclick="aggiungi()">Aggiungi</button>

  <div id="result">Totale: 0 kcal</div>

  <script>
    let totale = 0;

    function aggiungi() {
      let valore = document.getElementById("calorie").value;
      totale += Number(valore);
      document.getElementById("result").innerText = "Totale: " + totale + " kcal";
    }
  </script>

</body>
</html>
