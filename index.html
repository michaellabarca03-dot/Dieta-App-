<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dieta PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;text-align:center;padding:20px;margin-bottom:80px;background:#111;color:white;}
h1 {color:#ff3b3b;}

.box {background:#1c1c1c;padding:12px;margin:8px 0;border-radius:15px;display:flex;justify-content:space-between;align-items:center;}

button, select, input {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

/* barra */
.barra-container {background:#333;height:20px;border-radius:20px;}
#barra {height:100%;width:0%;background:#00ff88;border-radius:20px;}

/* navbar */
.navbar {position:fixed;bottom:0;width:100%;background:#000;display:flex;justify-content:space-around;}
.navbar div {color:white;padding:10px;}
.navbar .active {color:#ff3b3b;}

/* popup stile iphone */
#popup {
  display:none;
  position:fixed;
  bottom:0;
  width:100%;
  background:#222;
  border-radius:20px 20px 0 0;
  padding:20px;
  z-index:1000;
}

.picker {
  display:flex;
  justify-content:space-around;
}

.picker select {
  font-size:20px;
  height:150px;
}

/* immagini */
img {max-width:45%;border-radius:10px;margin:5px;}
</style>
</head>

<body>

<h1>Dieta 🔥</h1>

<!-- DIETA -->
<div id="dietaSection">
<input id="nomeAlimento" placeholder="Alimento">
<input id="kcalAlimento" type="number" placeholder="Kcal">
<button onclick="aggiungiAlimento()">Aggiungi</button>

<select id="giorno" onchange="cambiaGiorno()">
<option value="carica">Carica</option>
<option value="scarica">Scarica</option>
</select>

<button onclick="resetGiorno()">Reset</button>

<div id="lista"></div>
<div id="percentuale"></div>

<div class="barra-container"><div id="barra"></div></div>
</div>

<!-- TIMER -->
<div id="timerSection" style="display:none;">
<h2>Timer ⏱️</h2>
<h1 id="tempo">60</h1>

<button onclick="setTempo(60)">60</button>
<button onclick="setTempo(75)">75</button>
<button onclick="setTempo(90)">90</button>

<br><br>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

<br><br>

<select onchange="cambiaMusica(this.value)">
<option value="gym">Gym</option>
<option value="chill">Chill</option>
<option value="focus">Focus</option>
</select>

<iframe id="playerSpotify" width="100%" height="150"></iframe>
</div>

<!-- UTENTE -->
<div id="utenteSection" style="display:none;">
<h2>Utente 👤</h2>

<input id="altezza" placeholder="Altezza">
<input id="peso" placeholder="Peso">
<button onclick="salvaUtente()">Salva</button>

<p id="datiUtente"></p>

<h3>Grafico Peso 📈</h3>
<canvas id="graficoPeso"></canvas>
<button onclick="salvaPeso()">Salva Peso</button>

<h3>Prima / Dopo 📸</h3>
<input type="file" onchange="caricaFoto(event,'prima')">
<input type="file" onchange="caricaFoto(event,'dopo')">
<img id="fotoPrima">
<img id="fotoDopo">
</div>

<!-- SCHEDA -->
<div id="schedaSection" style="display:none;">
<h2>Scheda Palestra 💪</h2>

<h3>Workout A</h3>
<div class="box">Chest Press ⏱️90s <button onclick="apriPopup('A1')">➕</button><span id="val_A1"></span></div>
<div class="box">Lat Machine ⏱️90s <button onclick="apriPopup('A2')">➕</button><span id="val_A2"></span></div>

<h3>Workout B</h3>
<div class="box">Leg Extension ⏱️75s <button onclick="apriPopup('B1')">➕</button><span id="val_B1"></span></div>

<h3>Workout C</h3>
<div class="box">Incline Chest Press ⏱️90s <button onclick="apriPopup('C1')">➕</button><span id="val_C1"></span></div>

<h3>Workout D</h3>
<div class="box">Leg Press ⏱️90s <button onclick="apriPopup('D1')">➕</button><span id="val_D1"></span></div>

</div>

<!-- POPUP -->
<div id="popup">
<h3>Inserisci dati</h3>

<div class="picker">
<select id="pesoPicker"></select>
<select id="repsPicker"></select>
</div>

<br>

<button onclick="salvaPopup()">Salva</button>
<button onclick="chiudiPopup()">Chiudi</button>
</div>

<!-- NAV -->
<div class="navbar">
<div onclick="mostraSezione('dieta',this)" class="active">🍽️</div>
<div onclick="mostraSezione('timer',this)">⏱️</div>
<div onclick="mostraSezione('utente',this)">👤</div>
<div onclick="mostraSezione('scheda',this)">💪</div>
</div>

<script>

// PICKER iPhone style
for(let i=0;i<=200;i++){
  pesoPicker.innerHTML += `<option>${i} kg</option>`;
}
for(let i=1;i<=30;i++){
  repsPicker.innerHTML += `<option>${i} reps</option>`;
}

let current=null;

function apriPopup(nome){
  current=nome;
  popup.style.display="block";
}

function chiudiPopup(){
  popup.style.display="none";
}

function salvaPopup(){
  let valore = pesoPicker.value + " - " + repsPicker.value;

  let dati = JSON.parse(localStorage.getItem("scheda")) || {};
  dati[current]=valore;

  localStorage.setItem("scheda", JSON.stringify(dati));
  document.getElementById("val_"+current).innerText = valore;

  chiudiPopup();
}

// NAV
function mostraSezione(s,el){
["dieta","timer","utente","scheda"].forEach(x=>document.getElementById(x+"Section").style.display="none");
document.getElementById(s+"Section").style.display="block";
document.querySelectorAll(".navbar div").forEach(d=>d.classList.remove("active"));
el.classList.add("active");
}

</script>

</body>
</html>
