<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dieta</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin-bottom: 80px;
}

/* TEMI */
body.dark {
  background: #111;
  color: white;
}

body.light {
  background: #f5f5f5;
  color: black;
}

body.fitness {
  background: #000;
  color: #ff3b3b;
}

h1 { color: #ff3b3b; }

select, button {
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
  border: none;
}

.box {
  background: #1c1c1c;
  padding: 15px;
  margin: 10px 0;
  border-radius: 15px;
  text-align: left;
}

/* BARRA */
.barra-container {
  background: #333;
  border-radius: 20px;
  overflow: hidden;
  height: 20px;
  margin-top: 10px;
}

#barra {
  height: 100%;
  width: 0%;
  background: #00ff88;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.navbar div {
  text-align: center;
  color: white;
}

.navbar div.active {
  color: #ff3b3b;
}
</style>
</head>

<body class="dark">

<h1>Dieta 🔥</h1>

<!-- TEMA -->
<select onchange="cambiaTema(this.value)">
  <option value="dark">🌙 Dark</option>
  <option value="fitness">🔥 Fitness</option>
  <option value="light">☀️ Light</option>
</select>

<!-- DIETA -->
<div id="dietaSection">

<select id="giorno" onchange="cambiaGiorno()">
  <option value="carica">Carica</option>
  <option value="scarica">Scarica</option>
</select>

<button onclick="resetGiorno()" style="background:#ff3b3b; color:white;">Reset</button>

<div id="lista"></div>

<div id="percentuale">0%</div>

<div class="barra-container">
  <div id="barra"></div>
</div>

</div>

<!-- TIMER -->
<div id="timerSection" style="display:none;">
  <h2>Timer ⏱️</h2>

  <h1 id="tempo">60</h1>

  <button onclick="setTempo(60)">60</button>
  <button onclick="setTempo(75)">75</button>
  <button onclick="setTempo(90)">90</button>

  <br><br>

  <button onclick="startTimer()">Start</button>
  <button onclick="stopTimer()">Stop</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<!-- SCHEDA -->
<div id="schedaSection" style="display:none;">
  <h2>Scheda 💪</h2>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="mostraSezione('dieta', this)" class="active">🍽️<br>Dieta</div>
  <div onclick="mostraSezione('timer', this)">⏱️<br>Timer</div>
  <div onclick="mostraSezione('scheda', this)">💪<br>Scheda</div>
</div>

<script>

const dieta = {
  carica: ["Albume","Avena","Banana","Yogurt","Mandorle","Riso","Pollo","Uovo","Verdure","Patate","Manzo","Cereali"],
  scarica: ["Albume","Avena","Banana","Yogurt","Mandorle","Riso","Pollo","Uovo","Gallette","Bresaola","Patate","Cereali"]
};

let stato = JSON.parse(localStorage.getItem("stato")) || {};

/* TEMA */
function cambiaTema(tema) {
  document.body.className = tema;
  localStorage.setItem("tema", tema);
}

let tema = localStorage.getItem("tema") || "dark";
document.body.className = tema;

/* DIETA */
function cambiaGiorno() {
  let giorno = document.getElementById("giorno").value;
  mostraLista(giorno);
}

function mostraLista(giorno) {
  let lista = dieta[giorno];
  let html = "";

  lista.forEach((item, i) => {
    let key = giorno + "_" + i;
    let checked = stato[key] ? "checked" : "";

    html += `
      <div class="box">
        <label>
          <input type="checkbox" onchange="toggle('${key}')" ${checked}>
          ${item}
        </label>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
  aggiorna();
}

function toggle(key) {
  stato[key] = !stato[key];
  localStorage.setItem("stato", JSON.stringify(stato));
  aggiorna();
}

function aggiorna() {
  let giorno = document.getElementById("giorno").value;
  let lista = dieta[giorno];

  let fatti = 0;

  lista.forEach((_, i) => {
    if (stato[giorno + "_" + i]) fatti++;
  });

  let perc = Math.round((fatti / lista.length) * 100);

  document.getElementById("percentuale").innerText = perc + "%";

  document.getElementById("barra").style.width = perc + "%";

  let barra = document.getElementById("barra");
  barra.style.background = perc >= 80 ? "#00ff88" : "#ff3b3b";
}

function resetGiorno() {
  let giorno = document.getElementById("giorno").value;

  Object.keys(stato).forEach(key => {
    if (key.startsWith(giorno)) delete stato[key];
  });

  localStorage.setItem("stato", JSON.stringify(stato));
  cambiaGiorno();
}

/* NAV */
function mostraSezione(sezione, el) {
  document.getElementById("dietaSection").style.display = "none";
  document.getElementById("timerSection").style.display = "none";
  document.getElementById("schedaSection").style.display = "none";

  document.getElementById(sezione + "Section").style.display = "block";

  document.querySelectorAll(".navbar div").forEach(d => d.classList.remove("active"));
  el.classList.add("active");
}

/* TIMER */
let intervallo;
let tempo = 60;
let tempoIniziale = 60;

function setTempo(val) {
  tempo = val;
  tempoIniziale = val;
  document.getElementById("tempo").innerText = tempo;
}

function startTimer() {
  clearInterval(intervallo);

  intervallo = setInterval(() => {
    tempo--;
    document.getElementById("tempo").innerText = tempo;

    if (tempo <= 0) {
      clearInterval(intervallo);
      alert("Tempo finito!");
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(intervallo);
}

function resetTimer() {
  clearInterval(intervallo);
  tempo = tempoIniziale;
  document.getElementById("tempo").innerText = tempo;
}

cambiaGiorno();

</script>

</body>
</html>
