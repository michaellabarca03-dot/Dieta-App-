<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mike's GYM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:linear-gradient(180deg,#0a0a0b,#111);
color:white;
}

/* HEADER */
.header{
padding:25px 20px 10px;
font-size:28px;
font-weight:700;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border-radius:25px;
padding:18px;
margin:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

/* INPUT */
input,select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:16px;
border:none;
background:#1c1c1e;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:16px;
border:none;
background:linear-gradient(135deg,#0a84ff,#0066ff);
color:white;
font-weight:600;
}

button:active{transform:scale(0.96);}

/* NAV */
.navbar{
position:fixed;
bottom:15px;
left:10px;
right:10px;
display:flex;
justify-content:space-around;
background:rgba(20,20,20,0.8);
backdrop-filter:blur(30px);
border-radius:25px;
padding:12px 0;
}

.navbar div{opacity:0.5;font-size:20px;}
.navbar .active{opacity:1;transform:scale(1.2);}

.section{display:none;}
.activeSection{display:block;}

.timer{
font-size:60px;
text-align:center;
margin:20px 0;
}

/* ESERCIZI */
.exerciseCard{
background:rgba(255,255,255,0.06);
border-radius:20px;
padding:15px;
margin:12px 15px;
}

.exerciseCard b{display:block;margin-bottom:8px;}

.smallBtn{
padding:10px;
font-size:13px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="header">Mike's GYM</div>

<!-- DIETA -->
<div id="dieta" class="section activeSection">
<div class="card">
<input id="nome" placeholder="Alimento">
<input id="kcal" type="number" placeholder="Kcal">
<button onclick="addFood()">Aggiungi</button>
<button onclick="resetDay()">Reset giornata</button>
</div>

<div class="card">
<select id="day" onchange="changeDay()">
<option value="carica">Carica</option>
<option value="scarica">Scarica</option>
</select>

<div id="list"></div>
<h3 id="total"></h3>
</div>

<div class="card"><canvas id="chart"></canvas></div>
</div>

<!-- TIMER -->
<div id="timer" class="section">
<div class="card">

<div class="timer" id="time">60</div>

<button onclick="setTime(60)">60 sec</button>
<button onclick="setTime(75)">75 sec</button>
<button onclick="setTime(90)">90 sec</button>

<button onclick="start()">Start</button>
<button onclick="reset()">Reset</button>

</div>
</div>

<!-- USER -->
<div id="user" class="section">
<div class="card">
<input id="w" placeholder="Peso">
<button onclick="saveUser()">Salva peso</button>
<p id="info"></p>
<canvas id="weightChart"></canvas>
</div>
</div>

<!-- WORKOUT -->
<div id="workout" class="section">

<div class="card">
<select id="workoutDay" onchange="changeWorkoutDay()">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
</select>
</div>

<div class="card">
<input id="newExercise" placeholder="Nuovo esercizio">
<button onclick="addExercise()">Aggiungi</button>
</div>

<div id="exerciseList"></div>
</div>

<!-- NAV -->
<div class="navbar">
<div onclick="tab('dieta',this)" class="active">🍽️</div>
<div onclick="tab('timer',this)">⏱️</div>
<div onclick="tab('user',this)">⚖️</div>
<div onclick="tab('workout',this)">💪</div>
</div>

<script>

// NAV
function tab(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('activeSection'));
document.getElementById(id).classList.add('activeSection');
document.querySelectorAll('.navbar div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
}

// DIETA
let data=JSON.parse(localStorage.getItem("diet"))||{carica:[],scarica:[]};
let current="carica";

function addFood(){
let n=nome.value;
let k=parseInt(kcal.value);
if(!n||!k)return;
data[current].push({n,k});
localStorage.setItem("diet",JSON.stringify(data));
nome.value="";kcal.value="";
render();
}

function resetDay(){
data[current]=[];
localStorage.setItem("diet",JSON.stringify(data));
render();
}

function changeDay(){current=day.value;render();}

function render(){
list.innerHTML="";
let tot=0;
data[current].forEach(f=>{
tot+=f.k;
list.innerHTML+=`<div>${f.n} ${f.k}</div>`;
});
total.innerText=tot+" kcal";
updateChart();
}

// CHART
let chart=new Chart(document.getElementById('chart'),{
type:'doughnut',
data:{labels:['Calorie'],datasets:[{data:[0,3000],backgroundColor:['#0a84ff','#222']}]}
});

function updateChart(){
let tot=data[current].reduce((a,b)=>a+b.k,0);
chart.data.datasets[0].data=[tot,3000-tot];
chart.update();
}

// TIMER
let t=60,base=60,int;

function setTime(x){t=x;base=x;time.innerText=t;}
function start(){
clearInterval(int);
int=setInterval(()=>{t--;time.innerText=t;if(t<=0)clearInterval(int);},1000);
}
function reset(){t=base;time.innerText=t;}

// PESO
let weights=JSON.parse(localStorage.getItem("weights"))||[];

function saveUser(){
let peso=w.value;
let date=new Date().toLocaleDateString();
weights.push({peso,date});
localStorage.setItem("weights",JSON.stringify(weights));
info.innerText=`Ultimo peso: ${peso} kg`;
updateWeightChart();
}

let weightChart=new Chart(document.getElementById('weightChart'),{
type:'line',
data:{labels:[],datasets:[{label:'Peso',data:[],borderColor:'#0a84ff'}]}
});

function updateWeightChart(){
weightChart.data.labels=weights.map(w=>w.date);
weightChart.data.datasets[0].data=weights.map(w=>w.peso);
weightChart.update();
}

// WORKOUT
let workouts=JSON.parse(localStorage.getItem("workouts"))||{A:[],B:[],C:[],D:[],E:[]};
let currentWorkout="A";

function changeWorkoutDay(){
currentWorkout=workoutDay.value;
renderWorkout();
}

function addExercise(){
let name=newExercise.value;
if(!name)return;

workouts[currentWorkout].push({name,sets:"",reps:"",weight:"",note:"",history:[]});
localStorage.setItem("workouts",JSON.stringify(workouts));
newExercise.value="";
renderWorkout();
}

function renderWorkout(){
exerciseList.innerHTML="";

workouts[currentWorkout].forEach((ex,i)=>{
exerciseList.innerHTML+=`
<div class="exerciseCard">

<b>${ex.name}</b>

<input id="sets_${i}" placeholder="Serie" value="${ex.sets}">
<input id="reps_${i}" placeholder="Reps" value="${ex.reps}">
<input id="weight_${i}" placeholder="Peso" value="${ex.weight}">
<input id="note_${i}" placeholder="Note" value="${ex.note}">

<button class="smallBtn" onclick="saveExercise(${i})">💾 Salva</button>
<button class="smallBtn" onclick="completeSet(${i})">✅ Set</button>
<button class="smallBtn" onclick="resetFields(${i})">🔄 Reset</button>

<button class="smallBtn" onclick="startRest(60)">Rest 60</button>
<button class="smallBtn" onclick="startRest(90)">Rest 90</button>

<button class="smallBtn" onclick="deleteExercise(${i})" style="background:#ff3b30;">Elimina</button>

<div id="status_${i}" style="font-size:12px;color:#00ff88;"></div>

<div style="font-size:11px;">
${ex.history.map(h=>`<div>${h}</div>`).join("")}
</div>

</div>`;
});
}

function saveExercise(i){
let ex=workouts[currentWorkout][i];
ex.sets=sets_i=i?document.getElementById(`sets_${i}`).value:document.getElementById(`sets_${i}`).value;
ex.reps=document.getElementById(`reps_${i}`).value;
ex.weight=document.getElementById(`weight_${i}`).value;
ex.note=document.getElementById(`note_${i}`).value;

localStorage.setItem("workouts",JSON.stringify(workouts));

let s=document.getElementById(`status_${i}`);
s.innerText="Salvato ✔";
setTimeout(()=>s.innerText="",1500);
}

function completeSet(i){
let ex=workouts[currentWorkout][i];
let date=new Date().toLocaleDateString();
ex.history.unshift(`${date} - ${ex.sets}x${ex.reps} ${ex.weight}kg`);
localStorage.setItem("workouts",JSON.stringify(workouts));
renderWorkout();
}

function resetFields(i){
let ex=workouts[currentWorkout][i];
ex.sets="";ex.reps="";ex.weight="";ex.note="";
localStorage.setItem("workouts",JSON.stringify(workouts));
renderWorkout();
}

function deleteExercise(i){
workouts[currentWorkout].splice(i,1);
localStorage.setItem("workouts",JSON.stringify(workouts));
renderWorkout();
}

function startRest(sec){
t=sec;base=sec;
time.innerText=t;
tab('timer',document.querySelectorAll('.navbar div')[1]);
start();
}

// INIT
render();
renderWorkout();
updateWeightChart();

</script>

</body>
</html>
