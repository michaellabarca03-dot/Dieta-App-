<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dieta</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin-bottom: 80px;
  background:#111;
  color:white;
}

h1 { color: #ff3b3b; }

input, select, button {
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
  border: none;
}

.box {
  background: #1c1c1c;
  padding: 10px;
  margin: 8px 0;
  border-radius: 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.barra-container {
  background: #333;
  border-radius: 20px;
  height: 20px;
  margin-top: 10px;
}

#barra {
  height: 100%;
  width: 0%;
  background: #00ff88;
  border-radius:20px;
}

.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.navbar div { text-align:center; color:white; }
.navbar .active { color:#ff3b3b; }

img {
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Dieta 🔥</h1>

<!-- DIETA -->
<div id="dietaSection">

<input id="nomeAlimento" placeholder="Alimento">
<input id="kcalAlimento" type="number" placeholder="Kcal">
<button onclick="aggiungiAlimento()">Aggiungi</button>

<br>

<select id="giorno" onchange="cambiaGiorno()">
  <option value="carica">Carica</option>
  <option value="scarica">Scarica</option>
</select>

<button onclick="resetGiorno()">Reset</button>

<div id="lista"></div>

<div id="percentuale">0%</div>

<div class="barra-container">
  <div id="barra"></div>
</div>

</div>

<!-- TIMER -->
<div id="timerSection" style="display:none;">
  <h2>Timer ⏱️</h2>

  <h1 id="tempo">60</h1>

  <button onclick="setTempo(60)">60</button>
  <button onclick="setTempo(75)">75</button>
  <button onclick="setTempo(90)">90</button>

  <br><br>

  <button onclick="startTimer()">Start</button>
  <button onclick="stopTimer()">Stop</button>
  <button onclick="resetTimer()">Reset</button>

  <br><br>

  <h3>Musica 🎧</h3>

  <select onchange="cambiaMusica(this.value)">
    <option value="gym">🔥 Gym</option>
    <option value="chill">😎 Chill</option>
    <option value="focus">🎯 Focus</option>
  </select>

  <br><br>

  <iframe id="playerSpotify"
    style="border-radius:12px"
    width="100%"
    height="152"
    frameborder="0"
    allow="autoplay; encrypted-media">
  </iframe>

</div>

<!-- UTENTE -->
<div id="utenteSection" style="display:none;">
  <h2>Utente 👤</h2>

  <input id="altezza" placeholder="Altezza cm">
  <input id="peso" placeholder="Peso kg">

  <br>

  <button onclick="salvaUtente()">Salva</button>

  <p id="datiUtente"></p>

  <br>

  <h3>Check Foto 📸</h3>
  <input type="file" accept="image/*" onchange="caricaFoto(event)">

  <br><br>

  <img id="fotoPreview" style="width:100%; max-width:250px;">
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="mostraSezione('dieta', this)" class="active">🍽️<br>Dieta</div>
  <div onclick="mostraSezione('timer', this)">⏱️<br>Timer</div>
  <div onclick="mostraSezione('utente', this)">👤<br>Utente</div>
</div>

<script>

// SPOTIFY
const playlist = {
  gym: "https://open.spotify.com/embed/playlist/37i9dQZF1DX70RN3TfWWJh",
  chill: "https://open.spotify.com/embed/playlist/37i9dQZF1DX4WYpdgoIcn6",
  focus: "https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO"
};

function cambiaMusica(tipo) {
  document.getElementById("playerSpotify").src = playlist[tipo];
  localStorage.setItem("musica", tipo);
}

let musica = localStorage.getItem("musica") || "gym";
document.getElementById("playerSpotify").src = playlist[musica];

// DIETA
let dieta = JSON.parse(localStorage.getItem("dieta")) || {
  carica: [{ nome:"Riso", kcal:500 },{ nome:"Pollo", kcal:250 }],
  scarica: [{ nome:"Riso", kcal:350 },{ nome:"Uovo", kcal:70 }]
};

let stato = JSON.parse(localStorage.getItem("stato")) || {};

function cambiaGiorno() {
  mostraLista(document.getElementById("giorno").value);
}

function mostraLista(giorno) {
  let html = "";

  dieta[giorno].forEach((item, i) => {
    let key = giorno + "_" + i;
    let checked = stato[key] ? "checked" : "";

    html += `
      <div class="box">
        <div>
          <input type="checkbox" onchange="toggle('${key}')" ${checked}>
          ${item.nome} (${item.kcal} kcal)
        </div>
        <button onclick="rimuovi('${giorno}', ${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
  aggiorna();
}

function aggiungiAlimento() {
  let nome = document.getElementById("nomeAlimento").value;
  let kcal = Number(document.getElementById("kcalAlimento").value);
  let giorno = document.getElementById("giorno").value;

  if (!nome || !kcal) return;

  dieta[giorno].push({ nome, kcal });
  localStorage.setItem("dieta", JSON.stringify(dieta));
  cambiaGiorno();
}

function rimuovi(giorno, index) {
  dieta[giorno].splice(index, 1);
  localStorage.setItem("dieta", JSON.stringify(dieta));
  cambiaGiorno();
}

function toggle(key) {
  stato[key] = !stato[key];
  localStorage.setItem("stato", JSON.stringify(stato));
  aggiorna();
}

function aggiorna() {
  let giorno = document.getElementById("giorno").value;
  let lista = dieta[giorno];

  let fatti = 0;
  let kcal = 0;

  lista.forEach((item, i) => {
    if (stato[giorno + "_" + i]) {
      fatti++;
      kcal += item.kcal;
    }
  });

  let perc = Math.round((fatti / lista.length) * 100);

  document.getElementById("percentuale").innerText =
    perc + "% | " + kcal + " kcal";

  document.getElementById("barra").style.width = perc + "%";
}

function resetGiorno() {
  let giorno = document.getElementById("giorno").value;

  Object.keys(stato).forEach(k => {
    if (k.startsWith(giorno)) delete stato[k];
  });

  localStorage.setItem("stato", JSON.stringify(stato));
  cambiaGiorno();
}

// NAV
function mostraSezione(sezione, el) {
  document.getElementById("dietaSection").style.display = "none";
  document.getElementById("timerSection").style.display = "none";
  document.getElementById("utenteSection").style.display = "none";

  document.getElementById(sezione+"Section").style.display = "block";

  document.querySelectorAll(".navbar div").forEach(d=>d.classList.remove("active"));
  el.classList.add("active");
}

// TIMER
let intervallo;
let tempo = 60;
let base = 60;

function setTempo(v){ tempo=v; base=v; document.getElementById("tempo").innerText=v;}

function startTimer(){
  clearInterval(intervallo);
  intervallo=setInterval(()=>{
    tempo--;
    document.getElementById("tempo").innerText=tempo;
    if(tempo<=0){clearInterval(intervallo); alert("Finito");}
  },1000);
}

function stopTimer(){ clearInterval(intervallo); }

function resetTimer(){ tempo=base; document.getElementById("tempo").innerText=tempo; }

// UTENTE
function salvaUtente() {
  let altezza = document.getElementById("altezza").value;
  let peso = document.getElementById("peso").value;

  localStorage.setItem("utente", JSON.stringify({altezza,peso}));
  mostraUtente();
}

function mostraUtente() {
  let dati = JSON.parse(localStorage.getItem("utente"));
  if (!dati) return;

  document.getElementById("datiUtente").innerText =
    "Altezza: " + dati.altezza + " cm | Peso: " + dati.peso + " kg";
}

function caricaFoto(event) {
  let reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById("fotoPreview").src = e.target.result;
    localStorage.setItem("foto", e.target.result);
  };

  reader.readAsDataURL(event.target.files[0]);
}

let foto = localStorage.getItem("foto");
if (foto) document.getElementById("fotoPreview").src = foto;

mostraUtente();
cambiaGiorno();

</script>

</body>
</html>
