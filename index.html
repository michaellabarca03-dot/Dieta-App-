<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dieta PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin-bottom: 80px;
  background:#111;
  color:white;
}

h1 { color:#ff3b3b; }

input, select, button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

.box {
  background:#1c1c1c;
  padding:10px;
  margin:8px 0;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
}

.barra-container { background:#333; height:20px; border-radius:20px; }
#barra { height:100%; width:0%; background:#00ff88; border-radius:20px; }

.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
}

.navbar div { color:white; padding:10px; }
.navbar .active { color:#ff3b3b; }

img { max-width:45%; border-radius:10px; margin:5px; }
</style>
</head>

<body>

<h1>Dieta 🔥</h1>

<!-- DIETA -->
<div id="dietaSection">

<input id="nomeAlimento" placeholder="Alimento">
<input id="kcalAlimento" type="number" placeholder="Kcal">
<button onclick="aggiungiAlimento()">Aggiungi</button>

<br>

<select id="giorno" onchange="cambiaGiorno()">
<option value="carica">Carica</option>
<option value="scarica">Scarica</option>
</select>

<button onclick="resetGiorno()">Reset</button>

<div id="lista"></div>

<div id="percentuale"></div>

<div class="barra-container">
<div id="barra"></div>
</div>

</div>

<!-- TIMER -->
<div id="timerSection" style="display:none;">
<h2>Timer ⏱️</h2>
<h1 id="tempo">60</h1>

<button onclick="setTempo(60)">60</button>
<button onclick="setTempo(75)">75</button>
<button onclick="setTempo(90)">90</button>

<br><br>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

<br><br>

<select onchange="cambiaMusica(this.value)">
<option value="gym">Gym</option>
<option value="chill">Chill</option>
<option value="focus">Focus</option>
</select>

<br><br>

<iframe id="playerSpotify" width="100%" height="150"></iframe>

</div>

<!-- UTENTE -->
<div id="utenteSection" style="display:none;">
<h2>Utente 👤</h2>

<input id="altezza" placeholder="Altezza">
<input id="peso" placeholder="Peso">
<button onclick="salvaUtente()">Salva</button>

<p id="datiUtente"></p>

<h3>Grafico Peso 📈</h3>
<canvas id="graficoPeso"></canvas>

<br>

<button onclick="salvaPeso()">Salva Peso</button>

<h3>Prima / Dopo 📸</h3>

<input type="file" onchange="caricaFoto(event,'prima')">
<input type="file" onchange="caricaFoto(event,'dopo')">

<br>

<img id="fotoPrima">
<img id="fotoDopo">

</div>

<!-- SCHEDA -->
<div id="schedaSection" style="display:none;">
<h2>Scheda Palestra 💪</h2>
<p>Qui inseriremo la tua scheda</p>

<div id="schedaLista"></div>
</div>

<!-- NAV -->
<div class="navbar">
<div onclick="mostraSezione('dieta',this)" class="active">🍽️</div>
<div onclick="mostraSezione('timer',this)">⏱️</div>
<div onclick="mostraSezione('utente',this)">👤</div>
<div onclick="mostraSezione('scheda',this)">💪</div>
</div>

<script>

// SPOTIFY
const playlist = {
gym:"https://open.spotify.com/embed/playlist/37i9dQZF1DX70RN3TfWWJh",
chill:"https://open.spotify.com/embed/playlist/37i9dQZF1DX4WYpdgoIcn6",
focus:"https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO"
};

function cambiaMusica(tipo){
document.getElementById("playerSpotify").src=playlist[tipo];
}

// DIETA
let dieta = JSON.parse(localStorage.getItem("dieta"))||{
carica:[{nome:"Riso",kcal:500}],
scarica:[{nome:"Uovo",kcal:70}]
};

let stato = JSON.parse(localStorage.getItem("stato"))||{};

function cambiaGiorno(){
mostraLista(document.getElementById("giorno").value);
}

function mostraLista(g){
let html="";
dieta[g].forEach((item,i)=>{
let key=g+"_"+i;
html+=`<div class="box">
<div><input type="checkbox" onchange="toggle('${key}')">${item.nome} (${item.kcal})</div>
<button onclick="rimuovi('${g}',${i})">❌</button>
</div>`;
});
lista.innerHTML=html;
aggiorna();
}

function aggiungiAlimento(){
let nome=nomeAlimento.value;
let kcal=Number(kcalAlimento.value);
let g=giorno.value;
if(!nome||!kcal)return;
dieta[g].push({nome,kcal});
localStorage.setItem("dieta",JSON.stringify(dieta));
cambiaGiorno();
}

function rimuovi(g,i){
dieta[g].splice(i,1);
localStorage.setItem("dieta",JSON.stringify(dieta));
cambiaGiorno();
}

function toggle(k){
stato[k]=!stato[k];
localStorage.setItem("stato",JSON.stringify(stato));
aggiorna();
}

function aggiorna(){
let g=giorno.value;
let lista=dieta[g];
let fatti=0,kcal=0;

lista.forEach((item,i)=>{
if(stato[g+"_"+i]){fatti++;kcal+=item.kcal;}
});

let perc=Math.round((fatti/lista.length)*100);
percentuale.innerText=perc+"% | "+kcal+" kcal";
barra.style.width=perc+"%";
}

function resetGiorno(){
let g=giorno.value;
Object.keys(stato).forEach(k=>{if(k.startsWith(g))delete stato[k];});
localStorage.setItem("stato",JSON.stringify(stato));
cambiaGiorno();
}

// TIMER
let t=60,base=60,int;

function setTempo(v){t=v;base=v;tempo.innerText=v;}
function startTimer(){
clearInterval(int);
int=setInterval(()=>{t--;tempo.innerText=t;if(t<=0){clearInterval(int);alert("Fine");}},1000);
}
function stopTimer(){clearInterval(int);}
function resetTimer(){t=base;tempo.innerText=t;}

// UTENTE
function salvaUtente(){
localStorage.setItem("utente",JSON.stringify({altezza:altezza.value,peso:peso.value}));
mostraUtente();
}

function mostraUtente(){
let d=JSON.parse(localStorage.getItem("utente"));
if(!d)return;
datiUtente.innerText=`Altezza ${d.altezza} | Peso ${d.peso}`;
}

// GRAFICO
let storicoPeso=JSON.parse(localStorage.getItem("pesoStorico"))||[];

function salvaPeso(){
let p=Number(peso.value);
storicoPeso.push(p);
localStorage.setItem("pesoStorico",JSON.stringify(storicoPeso));
disegnaGrafico();
}

function disegnaGrafico(){
new Chart(document.getElementById("graficoPeso"),{
type:"line",
data:{labels:storicoPeso.map((_,i)=>i+1),datasets:[{data:storicoPeso}]}
});
}

// FOTO
function caricaFoto(e,tipo){
let r=new FileReader();
r.onload=e2=>{
if(tipo=="prima"){fotoPrima.src=e2.target.result;localStorage.setItem("fotoPrima",e2.target.result);}
else{fotoDopo.src=e2.target.result;localStorage.setItem("fotoDopo",e2.target.result);}
};
r.readAsDataURL(e.target.files[0]);
}

fotoPrima.src=localStorage.getItem("fotoPrima");
fotoDopo.src=localStorage.getItem("fotoDopo");

// NAV
function mostraSezione(s,el){
["dieta","timer","utente","scheda"].forEach(x=>document.getElementById(x+"Section").style.display="none");
document.getElementById(s+"Section").style.display="block";
document.querySelectorAll(".navbar div").forEach(d=>d.classList.remove("active"));
el.classList.add("active");
}

// INIT
cambiaGiorno();
mostraUtente();
disegnaGrafico();

</script>

</body>
</html>
