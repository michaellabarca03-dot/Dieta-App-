<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>GYM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;text-align:center;padding:20px;margin-bottom:80px;background:#111;color:white;}
h1 {color:#ff3b3b;}
input,select,button {padding:10px;margin:5px;border-radius:10px;border:none;}
.box {background:#1c1c1c;padding:10px;margin:8px 0;border-radius:15px;display:flex;justify-content:space-between;align-items:center;}
.barra-container {background:#333;height:20px;border-radius:20px;}
#barra {height:100%;width:0%;background:#00ff88;border-radius:20px;}
.navbar {position:fixed;bottom:0;width:100%;background:#000;display:flex;justify-content:space-around;}
.navbar div {color:white;padding:10px;}
.navbar .active {color:#ff3b3b;}
img {max-width:45%;border-radius:10px;margin:5px;}
</style>
</head>

<body>

<h1>GYM 🔥</h1>

<!-- DIETA -->
<div id="dietaSection">
<input id="nomeAlimento" placeholder="Alimento">
<input id="kcalAlimento" type="number" placeholder="Kcal">
<button onclick="aggiungiAlimento()">Aggiungi</button>

<select id="giorno" onchange="cambiaGiorno()">
<option value="carica">Carica</option>
<option value="scarica">Scarica</option>
</select>

<button onclick="resetGiorno()">Reset</button>

<div id="lista"></div>
<div id="percentuale"></div>
<div class="barra-container"><div id="barra"></div></div>
</div>

<!-- TIMER -->
<div id="timerSection" style="display:none;">
<h2>Timer ⏱️</h2>
<h1 id="tempo">60</h1>

<button onclick="setTempo(60)">60</button>
<button onclick="setTempo(75)">75</button>
<button onclick="setTempo(90)">90</button>

<br><br>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>
</div>

<!-- UTENTE -->
<div id="utenteSection" style="display:none;">
<h2>Utente 👤</h2>

<input id="altezza" placeholder="Altezza">
<input id="peso" placeholder="Peso">
<button onclick="salvaUtente()">Salva</button>

<p id="datiUtente"></p>

<h3>Grafico Peso 📈</h3>
<canvas id="graficoPeso"></canvas>
<button onclick="salvaPeso()">Salva Peso</button>

<h3>Prima / Dopo 📸</h3>
<input type="file" onchange="caricaFoto(event,'prima')">
<input type="file" onchange="caricaFoto(event,'dopo')">
<img id="fotoPrima">
<img id="fotoDopo">
</div>

<!-- SCHEDA COMPLETA -->
<div id="schedaSection" style="display:none;">
<h2>Scheda Palestra 💪</h2>

<h3>Workout A</h3>
<div class="box">Chest Press <input data-key="A1" onchange="salvaEsercizio(this)"></div>
<div class="box">Lat Machine <input data-key="A2" onchange="salvaEsercizio(this)"></div>
<div class="box">Shoulder Press <input data-key="A3" onchange="salvaEsercizio(this)"></div>
<div class="box">Row Machine <input data-key="A4" onchange="salvaEsercizio(this)"></div>

<h3>Workout B</h3>
<div class="box">Leg Extension <input data-key="B1" onchange="salvaEsercizio(this)"></div>
<div class="box">Leg Curl <input data-key="B2" onchange="salvaEsercizio(this)"></div>
<div class="box">Hip Thrust <input data-key="B3" onchange="salvaEsercizio(this)"></div>

<h3>Workout C</h3>
<div class="box">Incline Chest Press <input data-key="C1" onchange="salvaEsercizio(this)"></div>
<div class="box">Row <input data-key="C2" onchange="salvaEsercizio(this)"></div>
<div class="box">Lat <input data-key="C3" onchange="salvaEsercizio(this)"></div>

<h3>Workout D</h3>
<div class="box">Leg Press <input data-key="D1" onchange="salvaEsercizio(this)"></div>
<div class="box">Bulgarian <input data-key="D2" onchange="salvaEsercizio(this)"></div>
<div class="box">Calf <input data-key="D3" onchange="salvaEsercizio(this)"></div>

</div>

<!-- NAV -->
<div class="navbar">
<div onclick="mostraSezione('dieta',this)" class="active">🍽️</div>
<div onclick="mostraSezione('timer',this)">⏱️</div>
<div onclick="mostraSezione('utente',this)">👤</div>
<div onclick="mostraSezione('scheda',this)">💪</div>
</div>

<script>

// DIETA
let giornoCorrente="carica";
let alimenti=JSON.parse(localStorage.getItem("dieta"))||{carica:[],scarica:[]};

function salvaDieta(){localStorage.setItem("dieta",JSON.stringify(alimenti));}

function cambiaGiorno(){giornoCorrente=document.getElementById("giorno").value;renderLista();}

function aggiungiAlimento(){
let nome=document.getElementById("nomeAlimento").value;
let kcal=parseInt(document.getElementById("kcalAlimento").value);
if(!nome||!kcal)return;
alimenti[giornoCorrente].push({nome,kcal,attivo:true});
salvaDieta();renderLista();
}

function renderLista(){
let lista=document.getElementById("lista");lista.innerHTML="";
let totale=0;
alimenti[giornoCorrente].forEach((a,i)=>{
if(a.attivo)totale+=a.kcal;
let div=document.createElement("div");div.className="box";
div.innerHTML=`<span onclick="toggleAlimento(${i})">${a.attivo?"✅":"⬜"} ${a.nome} - ${a.kcal}</span>
<button onclick="eliminaAlimento(${i})">❌</button>`;
lista.appendChild(div);
});
document.getElementById("percentuale").innerText=totale+" kcal";
}

function toggleAlimento(i){alimenti[giornoCorrente][i].attivo=!alimenti[giornoCorrente][i].attivo;salvaDieta();renderLista();}
function eliminaAlimento(i){alimenti[giornoCorrente].splice(i,1);salvaDieta();renderLista();}
function resetGiorno(){alimenti[giornoCorrente]=[];salvaDieta();renderLista();}

// TIMER
let timer,tempo=60;
function setTempo(t){tempo=t;document.getElementById("tempo").innerText=tempo;}
function startTimer(){clearInterval(timer);timer=setInterval(()=>{if(tempo>0){tempo--;document.getElementById("tempo").innerText=tempo;}},1000);}
function stopTimer(){clearInterval(timer);}
function resetTimer(){clearInterval(timer);tempo=60;document.getElementById("tempo").innerText=tempo;}

// SCHEDA
function salvaEsercizio(el){
let dati=JSON.parse(localStorage.getItem("scheda"))||{};
dati[el.dataset.key]=el.value;
localStorage.setItem("scheda",JSON.stringify(dati));
}
function caricaScheda(){
let dati=JSON.parse(localStorage.getItem("scheda"))||{};
document.querySelectorAll("[data-key]").forEach(i=>{if(dati[i.dataset.key])i.value=dati[i.dataset.key];});
}

// UTENTE
function salvaUtente(){
let dati={altezza:altezza.value,peso:peso.value};
localStorage.setItem("utente",JSON.stringify(dati));
datiUtente.innerText=`Altezza: ${dati.altezza} - Peso: ${dati.peso}`;
}

function caricaUtente(){
let d=JSON.parse(localStorage.getItem("utente"))||{};
if(d.altezza)altezza.value=d.altezza;
if(d.peso)peso.value=d.peso;
datiUtente.innerText=`Altezza: ${d.altezza||""} - Peso: ${d.peso||""}`;
}

// NAV
function mostraSezione(s,el){
["dieta","timer","utente","scheda"].forEach(x=>document.getElementById(x+"Section").style.display="none");
document.getElementById(s+"Section").style.display="block";
document.querySelectorAll(".navbar div").forEach(d=>d.classList.remove("active"));
el.classList.add("active");
}

// AVVIO
document.addEventListener("DOMContentLoaded",()=>{
renderLista();
caricaScheda();
caricaUtente();
});

</script>

</body>
</html>
