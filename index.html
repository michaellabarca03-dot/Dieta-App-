<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>App Dieta</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { color: #ff3b3b; }

select {
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.box {
  background: #1c1c1c;
  padding: 15px;
  margin: 15px 0;
  border-radius: 15px;
  text-align: left;
}

label {
  display: block;
  margin: 5px 0;
}

#percentuale {
  margin-top: 20px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1> Dieta </h1> 

<select id="giorno" onchange="cambiaGiorno()">
  <option value="carica">Giorno Carica 💪</option>
  <option value="scarica">Giorno Scarica 😴</option>
</select>

<button onclick="resetGiorno()" style="
  margin: 10px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #ff3b3b;
  color: white;
  font-weight: bold;
">
  Reset Giorno 🔄
</button>
<div id="lista"></div>

<div id="percentuale">Completato: 0%</div> 
 
<script>

const dieta = {
  carica: [
    { nome: "Albume 200g", kcal: 100 },
    { nome: "Avena 100g", kcal: 380 },
    { nome: "Banana", kcal: 100 },
    { nome: "Yogurt 150g", kcal: 80 },
    { nome: "Mandorle 20g", kcal: 120 },
    { nome: "Riso 150g", kcal: 500 },
    { nome: "Pollo/Tacchino 160g", kcal: 250 },
    { nome: "Uovo", kcal: 70 },
    { nome: "Verdure 150g", kcal: 50 },
    { nome: "Patate 700g", kcal: 500 },
    { nome: "Manzo 150g", kcal: 300 },
    { nome: "Cereali 70g", kcal: 250 }
  ],
  scarica: [
    { nome: "Albume 200g", kcal: 100 },
    { nome: "Avena 80g", kcal: 300 },
    { nome: "Banana", kcal: 100 },
    { nome: "Yogurt 150g", kcal: 80 },
    { nome: "Mandorle 20g", kcal: 120 },
    { nome: "Riso 100g", kcal: 350 },
    { nome: "Pollo/Tacchino 160g", kcal: 250 },
    { nome: "Uovo", kcal: 70 },
    { nome: "Gallette 70g", kcal: 270 },
    { nome: "Bresaola 100g", kcal: 150 },
    { nome: "Patate 500g", kcal: 350 },
    { nome: "Cereali 80g", kcal: 300 }
  ]
};

let stato = JSON.parse(localStorage.getItem("stato")) || {};

// RESET AUTOMATICO GIORNALIERO
let oggi = new Date().toDateString();
let ultimo = localStorage.getItem("data");

if (ultimo !== oggi) {
  localStorage.removeItem("stato");
  localStorage.setItem("data", oggi);
}

// CAMBIO GIORNO
function cambiaGiorno() {
  let giorno = document.getElementById("giorno").value;
  mostraLista(giorno);
}

// MOSTRA LISTA
function mostraLista(giorno) {
  let lista = dieta[giorno];
  let html = "";

  lista.forEach((item, i) => {
    let key = giorno + "_" + i;
    let checked = stato[key] ? "checked" : "";

    html += `
      <div class="box">
        <label>
          <input type="checkbox" onchange="toggle('${key}')" ${checked}>
          ${item.nome} (${item.kcal} kcal)
        </label>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
  aggiornaPercentuale();
}

// TOGGLE CHECK
function toggle(key) {
  stato[key] = !stato[key];
  localStorage.setItem("stato", JSON.stringify(stato));
  aggiornaPercentuale();
}

// AGGIORNA %
function aggiornaPercentuale() {
  let giorno = document.getElementById("giorno").value;
  let lista = dieta[giorno];

  let fatti = 0;
  let totaleKcal = 0;

  lista.forEach((item, i) => {
    if (stato[giorno + "_" + i]) {
      fatti++;
      totaleKcal += item.kcal;
    }
  });

  let perc = Math.round((fatti / lista.length) * 100);

  document.getElementById("percentuale").innerText =
    "Completato: " + perc + "% | " + totaleKcal + " kcal";
}

// RESET MANUALE
function resetGiorno() {
  let conferma = confirm("Sicuro di voler resettare il giorno?");

  if (conferma) {
    let giorno = document.getElementById("giorno").value;

    Object.keys(stato).forEach(key => {
      if (key.startsWith(giorno)) {
        delete stato[key];
      }
    });

    localStorage.setItem("stato", JSON.stringify(stato));
    cambiaGiorno();
  }
}

// AVVIO
cambiaGiorno();

</script>
